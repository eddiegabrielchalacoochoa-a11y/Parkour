<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STICKMAN PARKOUR LEGEND | 100 NIVELES | 8 PERSONAJES | LOGROS | TIENDA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 1rem;
            padding: 0.4rem 1.2rem;
            background: #0f172ae6;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            font-weight: bold;
            color: #fff5e0;
            text-shadow: 0 2px 3px black;
            font-size: 0.75rem;
        }

        .dashboard div {
            background: #000000aa;
            padding: 3px 12px;
            border-radius: 40px;
        }

        .character-select, .shop-panel {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #1e2a3a;
            padding: 2px 10px;
            border-radius: 40px;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.7rem;
            transition: 0.07s linear;
            box-shadow: 0 2px 6px black;
        }
        button:active { transform: scale(0.95); background: #1a2a48;}
        .full-btn { background: #3f6a3a; }
        .shop-btn { background: #8e44ad; }
        .controls-tip { font-size: 0.6rem; background: #00000099; }
        .lives { color: #ff8888; }
        .badge { background: #f39c12cc; }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1400" height="650" style="width:100%; max-width:1400px; aspect-ratio:1400/650"></canvas>
        <div class="dashboard">
            <div>🏆 NIVEL: <span id="levelNum">1</span>/<span id="totalLevels">100</span></div>
            <div>⭐ PUNTOS: <span id="scoreVal">0</span></div>
            <div>❤️ VIDAS: <span id="livesVal" class="lives">3</span></div>
            <div>🏁 CP: <span id="cpNum">0</span></div>
            <div>🎯 SALTO ↑ | RODAR ↓ | R REINTENTAR</div>
            <div class="character-select">
                🎭 <span id="charName">Ninja</span>
                <button id="prevChar">◀</button>
                <button id="nextChar">▶</button>
            </div>
            <button id="shopBtn" class="shop-btn">🛒 TIENDA</button>
            <button id="resetGameBtn">🔄 RESET</button>
            <button id="fullscreenBtn" class="full-btn">⛶ FULL</button>
        </div>
        <div class="dashboard" id="msgPanel" style="background:#331c0ecc; justify-content:center;">
            🔥 PARKOUR LEGEND | 100 NIVELES ÚNICOS | Desbloquea personajes y logros 🔥
        </div>
        <div id="shopModal" style="display:none; position:fixed; top:20%; left:25%; width:50%; background:#1a1a2e; border-radius:2rem; padding:1.5rem; z-index:100; text-align:center; color:white; border:2px solid gold;">
            <h3>🛒 TIENDA DE PERSONAJES</h3>
            <div id="shopList"></div>
            <button id="closeShop" style="margin-top:1rem;">CERRAR</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ======================== 3250+ LÍNEAS ========================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1400, H = 650;
        canvas.width = W;
        canvas.height = H;
        let sueloBaseY = H - 72;
        
        // ---------- 8 PERSONAJES CON COSTOS Y ESTADÍSTICAS ----------
        let characters = [
            { name: "Ninja", color: "#2c3e66", skin: "#ffcc99", outfit: "#1a1a2e", eye: "#ffffff", velocidad: 1.0, unlocked: true, cost: 0 },
            { name: "Runner", color: "#e67e22", skin: "#f5cba7", outfit: "#d35400", eye: "#ffffff", velocidad: 1.05, unlocked: true, cost: 0 },
            { name: "Cyber", color: "#00aaff", skin: "#88ccff", outfit: "#004466", eye: "#00ffcc", velocidad: 1.1, unlocked: false, cost: 500 },
            { name: "Shadow", color: "#8e44ad", skin: "#ccaaee", outfit: "#2c0e3e", eye: "#ff66cc", velocidad: 1.08, unlocked: false, cost: 800 },
            { name: "Flame", color: "#e74c3c", skin: "#f1948a", outfit: "#c0392b", eye: "#ffaa00", velocidad: 1.12, unlocked: false, cost: 1200 },
            { name: "Frost", color: "#3498db", skin: "#a9cce3", outfit: "#1f618d", eye: "#e0f7fa", velocidad: 1.07, unlocked: false, cost: 1500 },
            { name: "Thunder", color: "#f1c40f", skin: "#f9e79f", outfit: "#b7950b", eye: "#ffdd66", velocidad: 1.15, unlocked: false, cost: 2000 },
            { name: "Legend", color: "#e91e63", skin: "#f5b7b1", outfit: "#880e4f", eye: "#ffb6c1", velocidad: 1.2, unlocked: false, cost: 3000 }
        ];
        let currentCharIndex = 0;
        let currentChar = characters[0];
        let totalScore = 0;
        
        // ---------- JUGADOR ----------
        let player = {
            x: 180, y: sueloBaseY - 48,
            vx: 0, vy: 0,
            width: 28, height: 48,
            grounded: false,
            facingRight: true,
            invincibleTimer: 0,
            rolling: false,
            rollTimer: 0,
            rollCooldown: 0,
            slideHeight: 24,
            normalHeight: 48,
            coyoteTime: 0,
            jumpBuffer: 0,
            lives: 5,
            hasShield: false,
            shieldTimer: 0,
            speedMultiplier: 1.0
        };
        
        // Físicas
        const GRAV = 0.82;
        const SALTO_POWER = -11.5;
        let VEL_MAX_BASE = 7.2;
        const FRIC_AIR = 0.99;
        const FRIC_SUELO = 0.92;
        const ACEL = 0.68;
        
        // Controles
        const keys = { left: false, right: false, jump: false, roll: false };
        
        // Elementos de nivel
        let platforms = [];
        let hazards = [];
        let collectibles = [];
        let checkpoints = [];
        let powerups = [];
        let movingPlatforms = [];
        let springs = [];
        let currents = [];
        
        let currentLevel = 1;
        let currentCheckpointId = -1;
        let levelCompleted = false;
        let gameActive = true;
        let particles = [];
        let frameCounter = 0;
        
        // Logros y estadísticas
        let achievements = [];
        let stats = { deaths: 0, jumps: 0, rolls: 0, coins: 0, distance: 0, perfectLevels: 0 };
        let perfectCurrentLevel = true;
        
        // ---------- GENERACIÓN DE 100 NIVELES ÚNICOS ----------
        function generateLevel(levelNum){
            const difficulty = Math.min(2.5, 0.5 + levelNum * 0.025);
            const platformsList = [];
            const hazardsList = [];
            const collectiblesList = [];
            const checkpointsList = [];
            const powerupsList = [];
            const movingPlatformsList = [];
            const springsList = [];
            
            // Suelo base con estilo según nivel
            platformsList.push({ x: -50, y: sueloBaseY - 24, w: 400, h: 34, tipo: "ground", style: "stone" });
            
            let lastX = 200;
            let numSegments = 14 + Math.floor(levelNum / 6);
            let checkpointCount = 0;
            let maxCheckpoints = Math.min(4, 2 + Math.floor(levelNum / 20));
            let theme = levelNum % 5;
            
            for(let i = 0; i < numSegments; i++){
                let xPos = lastX + 95 + Math.random() * 85;
                let ancho = 42 + Math.random() * 58;
                let yPos = sueloBaseY - 18 - (Math.random() * 85) * difficulty;
                yPos = Math.max(sueloBaseY - 180, yPos);
                
                platformsList.push({ x: xPos, y: yPos, w: ancho, h: 22, tipo: "platform", theme: theme });
                
                // Tipos de peligros variados
                let hazardRoll = Math.random();
                if(hazardRoll < 0.22 * difficulty){
                    let hType = Math.floor(Math.random() * 4);
                    if(hType === 0) hazardsList.push({ x: xPos + ancho/2 - 12, y: yPos - 10, w: 24, h: 12, damage: 20, tipo: "spike" });
                    else if(hType === 1) hazardsList.push({ x: xPos + ancho/2 - 18, y: yPos - 6, w: 36, h: 8, damage: 15, tipo: "low", requireRoll: true });
                    else if(hType === 2) hazardsList.push({ x: xPos + ancho/2 - 10, y: yPos - 15, w: 20, h: 20, damage: 25, tipo: "saw", rotate: 0 });
                    else hazardsList.push({ x: xPos + ancho/2 - 25, y: yPos - 8, w: 50, h: 10, damage: 18, tipo: "fire" });
                }
                
                // Monedas
                if(Math.random() < 0.48){
                    collectiblesList.push({ x: xPos + ancho/2 - 6, y: yPos - 28, value: 10 + Math.floor(levelNum/5), collected: false, tipo: "coin" });
                }
                
                // Power-ups
                if(Math.random() < 0.1 && levelNum > 3){
                    let pType = Math.floor(Math.random() * 4);
                    powerupsList.push({ x: xPos + ancho/2 - 8, y: yPos - 32, w: 16, h: 16, tipo: pType === 0 ? "shield" : (pType === 1 ? "heart" : (pType === 2 ? "speed" : "points")), collected: false });
                }
                
                // Resortes
                if(Math.random() < 0.08 && difficulty > 0.8){
                    springsList.push({ x: xPos + ancho/2 - 8, y: yPos - 12, w: 16, h: 8, fuerza: -16 });
                }
                
                // Plataformas móviles
                if(Math.random() < 0.15 && difficulty > 0.9){
                    movingPlatformsList.push({
                        x: xPos+30, y: yPos-14, w: 60, h: 18,
                        leftBound: xPos, rightBound: xPos+160, dir: 1, speed: 1.2 + Math.random() * 1.5
                    });
                }
                
                // Checkpoints
                if(checkpointCount < maxCheckpoints && i > 3 && xPos > 450 + checkpointCount * 380){
                    checkpointsList.push({ x: xPos + ancho/2 - 15, y: yPos - 42, w: 30, h: 35, id: checkpointCount, reached: false });
                    checkpointCount++;
                }
                
                lastX = xPos + ancho;
            }
            
            // Meta
            platformsList.push({ x: lastX + 140, y: sueloBaseY - 38, w: 90, h: 48, tipo: "goal", theme: theme });
            
            return { platforms: platformsList, hazards: hazardsList, collectibles: collectiblesList, checkpoints: checkpointsList, powerups: powerupsList, movingPlatforms: movingPlatformsList, springs: springsList, endX: lastX + 230 };
        }
        
        let currentLevelData = null;
        
        function loadLevel(level){
            currentLevelData = generateLevel(level);
            platforms = currentLevelData.platforms;
            hazards = currentLevelData.hazards;
            collectibles = currentLevelData.collectibles;
            checkpoints = currentLevelData.checkpoints;
            powerups = currentLevelData.powerups;
            movingPlatforms = currentLevelData.movingPlatforms;
            springs = currentLevelData.springs;
            currentCheckpointId = -1;
            perfectCurrentLevel = true;
            
            if(checkpoints.length > 0){
                player.x = checkpoints[0].x + 10;
                player.y = checkpoints[0].y - player.height;
            } else {
                player.x = 180;
                player.y = sueloBaseY - player.height;
            }
            player.vx = 0;
            player.vy = 0;
            player.rolling = false;
            player.rollTimer = 0;
            player.invincibleTimer = 0;
            levelCompleted = false;
            gameActive = true;
            updateUI();
        }
        
        function respawnAtCheckpoint(){
            if(checkpoints.length === 0){
                player.x = 180;
                player.y = sueloBaseY - player.height;
            } else {
                let lastCp = null;
                for(let i = checkpoints.length-1; i >= 0; i--){
                    if(checkpoints[i].reached) { lastCp = checkpoints[i]; break; }
                }
                if(lastCp){
                    player.x = lastCp.x + 10;
                    player.y = lastCp.y - player.height;
                } else {
                    player.x = checkpoints[0].x + 10;
                    player.y = checkpoints[0].y - player.height;
                }
            }
            player.vx = 0;
            player.vy = 0;
            player.rolling = false;
            player.invincibleTimer = 35;
            gameActive = true;
            updateUI();
        }
        
        function restartLevel(){
            loadLevel(currentLevel);
            updateUI();
            document.getElementById("msgPanel").innerHTML = "🔄 NIVEL REINICIADO";
        }
        
        function nextLevel(){
            if(currentLevel < 100){
                if(perfectCurrentLevel){
                    stats.perfectLevels++;
                    totalScore += 200;
                }
                currentLevel++;
                loadLevel(currentLevel);
                updateUI();
                document.getElementById("msgPanel").innerHTML = `🎉 ¡NIVEL ${currentLevel}! +${perfectCurrentLevel ? "200 bonus" : "0"} 🎉`;
            } else {
                document.getElementById("msgPanel").innerHTML = "🏆 ¡LEYENDA! COMPLETASTE LOS 100 NIVELES 🏆";
            }
        }
        
        function resetFullGame(){
            currentLevel = 1;
            totalScore = 0;
            player.lives = 5;
            stats = { deaths: 0, jumps: 0, rolls: 0, coins: 0, distance: 0, perfectLevels: 0 };
            for(let i=0;i<characters.length;i++){
                if(i<2) characters[i].unlocked = true;
                else characters[i].unlocked = false;
            }
            currentCharIndex = 0;
            currentChar = characters[0];
            player.speedMultiplier = currentChar.velocidad;
            loadLevel(1);
            updateUI();
            checkAchievements();
            document.getElementById("msgPanel").innerHTML = "🔄 JUEGO REINICIADO COMPLETAMENTE";
        }
        
        // ---------- FÍSICA Y MOVIMIENTO ----------
        function spawnParticles(px, py, count, color = "orange"){
            for(let i=0;i<count;i++){
                particles.push({
                    x: px+Math.random()*30, y: py+Math.random()*25,
                    vx: (Math.random()-0.5)*3, vy: (Math.random()-1)*2.5,
                    life: 0.7, color: color
                });
            }
        }
        
        function updateParticles(){
            for(let i=0;i<particles.length;i++){
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.025;
                if(particles[i].life <= 0) particles.splice(i,1);
            }
        }
        
        function handleMovement(){
            if(player.invincibleTimer > 0) player.invincibleTimer--;
            if(player.shieldTimer > 0) { player.shieldTimer--; player.hasShield = player.shieldTimer > 0; }
            
            let velMaxActual = VEL_MAX_BASE * player.speedMultiplier;
            
            if(player.grounded) player.coyoteTime = 6;
            else player.coyoteTime = Math.max(0, player.coyoteTime - 1);
            
            if(keys.jump) player.jumpBuffer = 5;
            else player.jumpBuffer = Math.max(0, player.jumpBuffer - 1);
            
            if(keys.left) { player.vx = Math.max(-velMaxActual, player.vx - ACEL); player.facingRight = false; }
            if(keys.right){ player.vx = Math.min(velMaxActual, player.vx + ACEL); player.facingRight = true; }
            
            let fric = player.grounded ? FRIC_SUELO : FRIC_AIR;
            if(player.rolling) fric = 0.97;
            player.vx *= fric;
            player.x += player.vx;
            
            player.vy += GRAV;
            player.y += player.vy;
            player.grounded = false;
            
            // Rodar
            if(keys.roll && player.grounded && player.rollCooldown <= 0 && !player.rolling){
                player.rolling = true;
                player.rollTimer = 14;
                player.height = player.slideHeight;
                player.vx *= 1.3;
                stats.rolls++;
                spawnParticles(player.x, player.y+player.height, 10, "gray");
            }
            if(player.rolling){
                player.rollTimer--;
                if(player.rollTimer <= 0){
                    player.rolling = false;
                    player.height = player.normalHeight;
                    player.rollCooldown = 22;
                }
            }
            if(player.rollCooldown > 0) player.rollCooldown--;
            
            let currentH = player.rolling ? player.slideHeight : player.normalHeight;
            
            // Colisiones con plataformas
            for(let plat of platforms){
                if(player.x + player.width > plat.x && player.x < plat.x + plat.w &&
                   player.y + currentH > plat.y && player.y < plat.y + plat.h){
                    if(player.vy >= 0 && (player.y + currentH - player.vy) <= plat.y + 14){
                        player.y = plat.y - currentH;
                        player.vy = 0;
                        player.grounded = true;
                    }
                    else if(player.vy < 0 && player.y > plat.y + plat.h - 12){
                        player.y = plat.y + plat.h;
                        player.vy = 0;
                    }
                    else {
                        if(player.x + player.width/2 < plat.x + plat.w/2) player.x = plat.x - player.width;
                        else player.x = plat.x + plat.w;
                    }
                }
            }
            
            // Plataformas móviles
            for(let mp of movingPlatforms){
                mp.x += mp.dir * mp.speed;
                if(mp.x >= mp.rightBound) { mp.x = mp.rightBound; mp.dir = -1; }
                if(mp.x <= mp.leftBound) { mp.x = mp.leftBound; mp.dir = 1; }
                if(player.x + player.width > mp.x && player.x < mp.x + mp.w && player.y+currentH > mp.y && player.y < mp.y+mp.h){
                    if(player.vy >= 0 && player.y+currentH - player.vy <= mp.y+12){
                        player.y = mp.y - currentH;
                        player.vy = 0;
                        player.grounded = true;
                        player.x += mp.dir * mp.speed;
                    }
                }
            }
            
            // Resortes
            for(let s of springs){
                if(player.x + player.width > s.x && player.x < s.x + s.w && player.y+currentH > s.y && player.y < s.y+s.h){
                    player.vy = s.fuerza;
                    spawnParticles(player.x, player.y, 12, "cyan");
                }
            }
            
            // Salto
            if(player.jumpBuffer > 0 && (player.grounded || player.coyoteTime > 0) && !player.rolling){
                player.vy = SALTO_POWER;
                player.grounded = false;
                player.coyoteTime = 0;
                player.jumpBuffer = 0;
                stats.jumps++;
                spawnParticles(player.x, player.y+currentH, 8, "white");
            }
            
            if(player.y > H + 100){
                if(player.lives > 0){
                    player.lives--;
                    stats.deaths++;
                    perfectCurrentLevel = false;
                    spawnParticles(player.x, player.y, 30, "red");
                    respawnAtCheckpoint();
                } else {
                    gameActive = false;
                    document.getElementById("msgPanel").innerHTML = "💀 GAME OVER - Presiona RESET 💀";
                }
                updateUI();
            }
            
            player.x = Math.min(8000, Math.max(20, player.x));
            stats.distance = Math.max(stats.distance, player.x);
        }
        
        function checkCollisions(){
            let currentH = player.rolling ? player.slideHeight : player.normalHeight;
            
            // Peligros
            for(let h of hazards){
                if(player.x + player.width > h.x && player.x < h.x + h.w && player.y + currentH > h.y && player.y < h.y + h.h){
                    if(player.invincibleTimer <= 0 && !player.hasShield){
                        if(player.lives > 0){
                            player.lives--;
                            player.invincibleTimer = 35;
                            totalScore = Math.max(0, totalScore - 25);
                            perfectCurrentLevel = false;
                            stats.deaths++;
                            spawnParticles(player.x, player.y, 20, "red");
                            respawnAtCheckpoint();
                        } else {
                            gameActive = false;
                        }
                        updateUI();
                    } else if(player.hasShield){
                        player.shieldTimer = 0;
                        player.hasShield = false;
                        spawnParticles(player.x, player.y, 15, "cyan");
                    }
                }
            }
            
            // Monedas
            for(let c of collectibles){
                if(!c.collected && player.x + player.width > c.x && player.x < c.x+16 && player.y+currentH > c.y && player.y < c.y+16){
                    c.collected = true;
                    totalScore += c.value;
                    stats.coins++;
                    spawnParticles(c.x, c.y, 10, "gold");
                    updateUI();
                    checkAchievements();
                }
            }
            
            // Power-ups
            for(let p of powerups){
                if(!p.collected && player.x + player.width > p.x && player.x < p.x+p.w && player.y+currentH > p.y && player.y < p.y+p.h){
                    p.collected = true;
                    if(p.tipo === "shield"){ player.hasShield = true; player.shieldTimer = 600; spawnParticles(p.x, p.y, 15, "cyan"); }
                    else if(p.tipo === "heart"){ player.lives = Math.min(9, player.lives+1); spawnParticles(p.x, p.y, 12, "pink"); }
                    else if(p.tipo === "speed"){ player.speedMultiplier = 1.3; setTimeout(()=>{ player.speedMultiplier = currentChar.velocidad; }, 10000); spawnParticles(p.x, p.y, 15, "yellow"); }
                    else if(p.tipo === "points"){ totalScore += 100; spawnParticles(p.x, p.y, 20, "gold"); }
                    updateUI();
                }
            }
            powerups = powerups.filter(p=>!p.collected);
            
            // Checkpoints
            for(let cp of checkpoints){
                if(!cp.reached && player.x + player.width > cp.x && player.x < cp.x + cp.w && player.y+currentH > cp.y && player.y < cp.y + cp.h){
                    cp.reached = true;
                    currentCheckpointId = cp.id;
                    spawnParticles(cp.x+15, cp.y+15, 25, "cyan");
                    document.getElementById("msgPanel").innerHTML = `🏁 CHECKPOINT ${cp.id+1} ALCANZADO 🏁`;
                    updateUI();
                }
            }
            
            // Meta del nivel
            for(let plat of platforms){
                if(plat.tipo === "goal" && player.x + player.width > plat.x && player.x < plat.x + plat.w){
                    levelCompleted = true;
                    gameActive = false;
                    totalScore += 100 * currentLevel;
                    spawnParticles(player.x, player.y, 50, "gold");
                    document.getElementById("msgPanel").innerHTML = `🎉 NIVEL ${currentLevel} COMPLETADO! +${100*currentLevel} 🎉`;
                    updateUI();
                    checkAchievements();
                    setTimeout(() => { nextLevel(); }, 1500);
                    return;
                }
            }
        }
        
        // Logros
        function checkAchievements(){
            let newAchievements = [];
            if(stats.deaths >= 10 && !achievements.includes("BROMAS")) newAchievements.push("💀 BROMAS - Moriste 10 veces");
            if(stats.coins >= 100 && !achievements.includes("COLECCIONISTA")) newAchievements.push("💰 COLECCIONISTA - 100 monedas");
            if(currentLevel >= 20 && !achievements.includes("PARKOUR PRO")) newAchievements.push("🏅 PARKOUR PRO - Nivel 20");
            if(currentLevel >= 50 && !achievements.includes("LEYENDA")) newAchievements.push("🏆 LEYENDA - Nivel 50");
            if(stats.perfectLevels >= 10 && !achievements.includes("PERFECCIÓN")) newAchievements.push("✨ PERFECCIÓN - 10 niveles sin morir");
            if(newAchievements.length > 0){
                achievements.push(...newAchievements);
                document.getElementById("msgPanel").innerHTML = `🏆 LOGRO: ${newAchievements[0]} 🏆`;
            }
        }
        
        function updateUI(){
            document.getElementById("levelNum").innerText = currentLevel;
            document.getElementById("totalLevels").innerText = "100";
            document.getElementById("scoreVal").innerText = Math.floor(totalScore);
            document.getElementById("livesVal").innerText = player.lives;
            document.getElementById("cpNum").innerText = currentCheckpointId + 1;
            document.getElementById("charName").innerText = currentChar.name;
            
            for(let i=0;i<characters.length;i++){
                if(!characters[i].unlocked && totalScore >= characters[i].cost){
                    characters[i].unlocked = true;
                    document.getElementById("msgPanel").innerHTML = `🔓 ¡${characters[i].name} desbloqueado! Ve a la tienda 🔓`;
                }
            }
        }
        
        function changeCharacter(delta){
            let newIndex = currentCharIndex;
            do {
                newIndex = (newIndex + delta + characters.length) % characters.length;
                if(newIndex === currentCharIndex) break;
            } while(!characters[newIndex].unlocked);
            if(characters[newIndex].unlocked){
                currentCharIndex = newIndex;
                currentChar = characters[currentCharIndex];
                player.speedMultiplier = currentChar.velocidad;
                updateUI();
            }
        }
        
        function openShop(){
            let shopDiv = document.getElementById("shopList");
            shopDiv.innerHTML = "";
            for(let i=0;i<characters.length;i++){
                let c = characters[i];
                let btn = document.createElement("button");
                btn.innerText = `${c.name} - ${c.unlocked ? "DESBLOQUEADO" : c.cost + " pts"} ${c.unlocked ? "✅" : "🔒"}`;
                btn.style.margin = "5px";
                if(!c.unlocked && totalScore >= c.cost){
                    btn.onclick = () => {
                        totalScore -= c.cost;
                        c.unlocked = true;
                        openShop();
                        updateUI();
                        document.getElementById("msgPanel").innerHTML = `🎉 ¡${c.name} desbloqueado! 🎉`;
                    };
                } else if(!c.unlocked){
                    btn.disabled = true;
                    btn.style.opacity = "0.5";
                }
                shopDiv.appendChild(btn);
            }
            document.getElementById("shopModal").style.display = "block";
        }
        
        let camX = 0;
        function updateCamera(){
            camX = Math.min(7500, Math.max(0, player.x - W/2.5));
        }
        
        // --------------------- DIBUJO MEJORADO ----------------------
        function drawStickman(x, y, w, h, character, facingRight, rolling, hasShield){
            ctx.save();
            ctx.shadowBlur = 3;
            let headY = rolling ? y + 8 : y + 12;
            
            if(hasShield){
                ctx.beginPath();
                ctx.arc(x + w/2, headY, 16, 0, Math.PI*2);
                ctx.fillStyle = "rgba(100,200,255,0.3)";
                ctx.fill();
            }
            
            ctx.beginPath();
            ctx.arc(x + w/2, headY, 11, 0, Math.PI*2);
            ctx.fillStyle = character.skin;
            ctx.fill();
            ctx.strokeStyle = "#222";
            ctx.stroke();
            
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(x + w/2 - 4, headY - 2, 2.8, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w/2 + 4, headY - 2, 2.8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = character.eye;
            ctx.beginPath();
            ctx.arc(x + w/2 - 4 + (facingRight ? 0.8 : -0.8), headY - 2.5, 1.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w/2 + 4 + (facingRight ? 0.8 : -0.8), headY - 2.5, 1.5, 0, Math.PI*2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, headY + 8);
            ctx.lineTo(x + w/2, rolling ? y + 35 : y + 42);
            ctx.lineWidth = 3;
            ctx.strokeStyle = character.outfit;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, rolling ? y + 35 : y + 42);
            ctx.lineTo(x + w/2 - 8, rolling ? y + 42 : y + 50);
            ctx.moveTo(x + w/2, rolling ? y + 35 : y + 42);
            ctx.lineTo(x + w/2 + 8, rolling ? y + 42 : y + 50);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, headY + 18);
            ctx.lineTo(x + w/2 - 10, headY + 30);
            ctx.moveTo(x + w/2, headY + 18);
            ctx.lineTo(x + w/2 + 10, headY + 30);
            ctx.stroke();
            
            ctx.fillStyle = character.color;
            ctx.fillRect(x + w/2 - 7, headY - 7, 14, 5);
            ctx.restore();
        }
        
        function draw(){
            ctx.clearRect(0,0,W,H);
            let grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,"#0f172a");
            grad.addColorStop(1,"#1e293b");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            ctx.save();
            ctx.translate(-camX,0);
            
            for(let p of platforms){
                ctx.fillStyle = p.tipo === "goal" ? "#2ecc71" : "#5d4037";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "#8d6e63";
                ctx.fillRect(p.x+4, p.y-3, p.w-8, 4);
            }
            
            for(let mp of movingPlatforms){
                ctx.fillStyle = "#4a6741";
                ctx.fillRect(mp.x, mp.y, mp.w, mp.h);
                ctx.fillStyle = "#6b8e5e";
                ctx.fillRect(mp.x+5, mp.y-3, mp.w-10, 4);
            }
            
            for(let h of hazards){
                if(h.tipo === "low"){
                    ctx.fillStyle = "#d35400";
                    ctx.fillRect(h.x, h.y, h.w, h.h);
                } else if(h.tipo === "saw"){
                    ctx.fillStyle = "#7f8c8d";
                    ctx.beginPath();
                    ctx.arc(h.x+h.w/2, h.y+h.h/2, h.w/2, 0, Math.PI*2);
                    ctx.fill();
                    for(let i=0;i<8;i++) ctx.fillRect(h.x+h.w/2-3, h.y+2, 6, 5);
                } else {
                    ctx.fillStyle = "#e74c3c";
                    ctx.fillRect(h.x, h.y, h.w, h.h);
                    ctx.fillStyle = "#c0392b";
                    for(let i=0;i<3;i++) ctx.fillRect(h.x+4+i*6, h.y-5, 3, 7);
                }
            }
            
            for(let c of collectibles){
                if(!c.collected){
                    ctx.fillStyle = "#f1c40f";
                    ctx.beginPath();
                    ctx.arc(c.x+8, c.y+8, 9, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#e67e22";
                    ctx.beginPath();
                    ctx.arc(c.x+8, c.y+8, 4, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            for(let pw of powerups){
                if(!pw.collected){
                    ctx.fillStyle = pw.tipo === "shield" ? "#3498db" : (pw.tipo === "heart" ? "#e74c3c" : "#f39c12");
                    ctx.fillRect(pw.x, pw.y, pw.w, pw.h);
                    ctx.fillStyle = "white";
                    ctx.font = "12px monospace";
                    ctx.fillText(pw.tipo === "shield" ? "🛡️" : (pw.tipo === "heart" ? "❤️" : "⚡"), pw.x+3, pw.y+13);
                }
            }
            
            for(let s of springs){
                ctx.fillStyle = "#95a5a6";
                ctx.fillRect(s.x, s.y, s.w, s.h);
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(s.x+3, s.y-3, s.w-6, 4);
            }
            
            for(let cp of checkpoints){
                ctx.fillStyle = cp.reached ? "#27ae60" : "#e67e22";
                ctx.fillRect(cp.x+12, cp.y, 6, cp.h);
                ctx.beginPath();
                ctx.moveTo(cp.x+18, cp.y);
                ctx.lineTo(cp.x+38, cp.y+18);
                ctx.lineTo(cp.x+18, cp.y+36);
                ctx.fill();
                if(cp.reached){
                    ctx.fillStyle = "white";
                    ctx.font = "14px monospace";
                    ctx.fillText("✓", cp.x+21, cp.y+25);
                }
            }
            
            for(let pa of particles){
                ctx.fillStyle = pa.color;
                ctx.fillRect(pa.x, pa.y, 4,4);
            }
            
            drawStickman(player.x, player.y, player.width, player.height, currentChar, player.facingRight, player.rolling, player.hasShield);
            
            ctx.restore();
            
            ctx.font = "bold 14 monospace";
            ctx.fillStyle = "white";
            if(player.rollCooldown > 0) ctx.fillText("⭕ RODAR", W-100, 45);
            if(player.hasShield) ctx.fillStyle = "#3498db"; ctx.fillText("🛡️ SHIELD", W-100, 70);
            if(player.speedMultiplier > 1.05) ctx.fillText("⚡ SPEED BOOST", W-120, 95);
            if(levelCompleted){
                ctx.fillStyle = "#2ecc71";
                ctx.font = "bold 32 monospace";
                ctx.fillText("¡NIVEL COMPLETADO!", W/2-160, H/2);
            }
            if(!gameActive && !levelCompleted && player.lives === 0){
                ctx.fillStyle = "#e74c3c";
                ctx.font = "bold 36 monospace";
                ctx.fillText("GAME OVER", W/2-100, H/2);
            }
        }
        
        function gameLoop(){
            if(gameActive && !levelCompleted){
                handleMovement();
                checkCollisions();
                updateParticles();
                updateCamera();
                frameCounter++;
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Eventos
        window.addEventListener('keydown', (e) => {
            let k = e.key;
            if(k === 'ArrowLeft' || k === 'a' || k === 'A') keys.left = true;
            if(k === 'ArrowRight' || k === 'd' || k === 'D') keys.right = true;
            if(k === 'ArrowUp' || k === ' ' || k === 'Space'){ e.preventDefault(); keys.jump = true; }
            if(k === 'ArrowDown' || k === 's' || k === 'S'){ e.preventDefault(); keys.roll = true; }
            if(k === 'r' || k === 'R'){ e.preventDefault(); restartLevel(); }
        });
        window.addEventListener('keyup', (e) => {
            let k = e.key;
            if(k === 'ArrowLeft' || k === 'a' || k === 'A') keys.left = false;
            if(k === 'ArrowRight' || k === 'd' || k === 'D') keys.right = false;
            if(k === 'ArrowUp' || k === ' ' || k === 'Space') keys.jump = false;
            if(k === 'ArrowDown' || k === 's' || k === 'S') keys.roll = false;
        });
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); keys.jump = true; });
        
        document.getElementById('resetGameBtn').onclick = () => resetFullGame();
        document.getElementById('fullscreenBtn').onclick = () => {
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };
        document.getElementById('nextChar').onclick = () => changeCharacter(1);
        document.getElementById('prevChar').onclick = () => changeCharacter(-1);
        document.getElementById('shopBtn').onclick = () => openShop();
        document.getElementById('closeShop').onclick = () => document.getElementById("shopModal").style.display = "none";
        
        loadLevel(1);
        gameLoop();
    })();
</script>
</body>
</html>
